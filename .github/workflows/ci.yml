name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install deps
        run: uv sync --dev
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy app
      - name: Pytest
        env:
          JWT_SECRET: ci-secret-please-change-32-characters-min
        run: uv run pytest
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
