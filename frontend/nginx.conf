server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: semua route diarahkan ke index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache aset hasil build (file ber-hash)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
